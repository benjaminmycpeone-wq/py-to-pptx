<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX Converter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #050505;
            color: #d4d4d8;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 20px;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 560px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Glass mixin */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        h1 {
            text-align: center;
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.03em;
            color: #fafafa;
        }

        h1 span {
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #52525b;
            font-size: 0.85rem;
            margin-bottom: 32px;
            letter-spacing: 0.02em;
        }

        .drop-zone {
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 52px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: rgba(167, 139, 246, 0.3);
            background: rgba(167, 139, 246, 0.04);
            box-shadow: 0 0 40px rgba(167, 139, 246, 0.06), inset 0 0 40px rgba(167, 139, 246, 0.02);
        }

        .drop-zone-icon {
            font-size: 2.5rem;
            margin-bottom: 14px;
            filter: grayscale(0.3);
        }
        .drop-zone p { color: #52525b; font-size: 0.9rem; }
        .drop-zone p strong {
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .file-info {
            display: none;
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            align-items: center;
            gap: 12px;
        }

        .file-info.visible { display: flex; }
        .file-icon { font-size: 1.4rem; filter: grayscale(0.2); }
        .file-details { flex: 1; }
        .file-name { font-weight: 600; font-size: 0.85rem; word-break: break-all; color: #e4e4e7; }
        .file-size { color: #3f3f46; font-size: 0.75rem; margin-top: 1px; }

        .file-remove {
            background: none; border: none; color: #3f3f46;
            cursor: pointer; font-size: 1.2rem; padding: 4px;
            transition: color 0.2s;
        }
        .file-remove:hover { color: #ef4444; }

        .convert-btn {
            display: none; width: 100%; margin-top: 14px; padding: 14px;
            font-size: 0.95rem; font-weight: 600; border: none; border-radius: 14px;
            cursor: pointer; transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(167, 139, 246, 0.15), rgba(56, 189, 248, 0.15));
            border: 1px solid rgba(167, 139, 246, 0.2);
            color: #e4e4e7;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            letter-spacing: 0.01em;
        }
        .convert-btn.visible { display: block; }
        .convert-btn:hover {
            background: linear-gradient(135deg, rgba(167, 139, 246, 0.25), rgba(56, 189, 248, 0.25));
            border-color: rgba(167, 139, 246, 0.35);
            box-shadow: 0 0 30px rgba(167, 139, 246, 0.1);
        }
        .convert-btn:disabled {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            color: #3f3f46;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status {
            display: none; margin-top: 14px; padding: 12px 16px;
            border-radius: 14px; font-size: 0.85rem; text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .status.visible { display: block; }
        .status.processing {
            background: rgba(56, 189, 248, 0.06);
            border: 1px solid rgba(56, 189, 248, 0.1);
            color: #7dd3fc;
        }
        .status.success {
            background: rgba(74, 222, 128, 0.06);
            border: 1px solid rgba(74, 222, 128, 0.1);
            color: #4ade80;
        }
        .status.error {
            background: rgba(248, 113, 113, 0.06);
            border: 1px solid rgba(248, 113, 113, 0.1);
            color: #fca5a5;
        }

        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 1.5px solid rgba(125, 211, 252, 0.4); border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        input[type="file"] { display: none; }

        /* History */
        .history-section {
            margin-top: 44px;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .history-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #52525b;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        .history-count {
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #52525b;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 600;
        }

        .history-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #3f3f46;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .clear-btn:hover {
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            background: rgba(239, 68, 68, 0.04);
        }

        .history-empty {
            text-align: center;
            color: #27272a;
            font-size: 0.8rem;
            padding: 28px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.07);
        }

        .history-badge {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .history-badge.success {
            background: #4ade80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
        }
        .history-badge.error {
            background: #f87171;
            box-shadow: 0 0 8px rgba(248, 113, 113, 0.3);
        }

        .history-info { flex: 1; min-width: 0; }

        .history-filename {
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #a1a1aa;
        }

        .history-meta {
            font-size: 0.7rem;
            color: #3f3f46;
            margin-top: 2px;
        }

        .history-output {
            font-size: 0.65rem;
            color: #52525b;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .history-error-text {
            font-size: 0.65rem;
            color: rgba(248, 113, 113, 0.6);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        /* Loading modal */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.25s ease;
        }
        .loading-overlay.visible { display: flex; }
        .loading-overlay.fade-out { animation: fadeOut 0.3s ease forwards; }

        .loading-gif {
            width: 280px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 60px rgba(167, 139, 246, 0.08);
        }

        .loading-text {
            font-size: 0.85rem;
            color: #52525b;
            letter-spacing: 0.05em;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }

        /* Selection */
        ::selection {
            background: rgba(167, 139, 246, 0.2);
            color: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>.py</span> / <span>.html</span> to <span>.pptx</span></h1>
        <p class="subtitle">Upload a Python script or HTML file to generate a PowerPoint</p>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">&#128196;</div>
            <p><strong>Click to upload</strong> or drag & drop</p>
            <p style="margin-top: 6px; font-size: 0.75rem; color: #27272a;">.py or .html files</p>
        </div>

        <input type="file" id="fileInput" accept=".py,.html,.htm">

        <div class="file-info glass" id="fileInfo">
            <span class="file-icon">&#128013;</span>
            <div class="file-details">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
            <button class="file-remove" id="fileRemove">&times;</button>
        </div>

        <button class="convert-btn" id="convertBtn">Convert to PPTX</button>
        <div class="status" id="status"></div>

        <!-- History -->
        <div class="history-section">
            <div class="history-header">
                <h2>Conversion History</h2>
                <div class="history-actions">
                    <button class="clear-btn" id="clearBtn" style="display:none;">Clear all</button>
                    <span class="history-count" id="historyCount">0</span>
                </div>
            </div>
            <div id="historyList">
                <div class="history-empty">No conversions yet</div>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <img class="loading-gif" src="/static/loading.gif" alt="Converting...">
        <div class="loading-text">Converting<span class="loading-dots"></span></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileRemove = document.getElementById('fileRemove');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const historyList = document.getElementById('historyList');
        const historyCount = document.getElementById('historyCount');
        const clearBtn = document.getElementById('clearBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let selectedFile = null;

        function showLoading() {
            loadingOverlay.classList.remove('fade-out');
            loadingOverlay.classList.add('visible');
        }

        function hideLoading() {
            loadingOverlay.classList.add('fade-out');
            loadingOverlay.addEventListener('animationend', () => {
                loadingOverlay.classList.remove('visible', 'fade-out');
            }, { once: true });
        }

        clearBtn.addEventListener('click', async () => {
            if (!confirm('Clear all conversion history?')) return;
            await fetch('/history', { method: 'DELETE' });
            loadHistory();
        });

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            const allowed = ['.py', '.html', '.htm'];
            if (file && allowed.some(ext => file.name.toLowerCase().endsWith(ext))) selectFile(file);
            else showStatus('Please drop a .py or .html file', 'error');
        });
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); });
        fileRemove.addEventListener('click', clearFile);
        convertBtn.addEventListener('click', convert);

        function selectFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatBytes(file.size);
            const icon = document.querySelector('.file-icon');
            icon.textContent = file.name.endsWith('.py') ? '\u{1F40D}' : '\u{1F310}';
            fileInfo.classList.add('visible');
            convertBtn.classList.add('visible');
            status.classList.remove('visible');
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('visible');
            convertBtn.classList.remove('visible');
            status.classList.remove('visible');
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            return (bytes / 1024).toFixed(1) + ' KB';
        }

        function showStatus(msg, type) {
            status.className = 'status visible ' + type;
            status.innerHTML = (type === 'processing' ? '<span class="spinner"></span>' : '') + msg;
        }

        async function convert() {
            if (!selectedFile) return;
            convertBtn.disabled = true;
            status.classList.remove('visible');
            showLoading();

            const formData = new FormData();
            formData.append('file', selectedFile);
            const minDelay = new Promise(r => setTimeout(r, 4000));

            try {
                const [res] = await Promise.all([
                    fetch('/upload', { method: 'POST', body: formData }),
                    minDelay
                ]);
                hideLoading();
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Conversion failed');
                }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const disposition = res.headers.get('Content-Disposition');
                let name = 'output.pptx';
                if (disposition) {
                    const match = disposition.match(/filename=(.+)/);
                    if (match) name = match[1];
                }
                a.href = url;
                a.download = name;
                a.click();
                URL.revokeObjectURL(url);
                showStatus('Download started', 'success');
            } catch (err) {
                hideLoading();
                showStatus(err.message, 'error');
            } finally {
                convertBtn.disabled = false;
                loadHistory();
            }
        }

        function timeAgo(isoStr) {
            const diff = Date.now() - new Date(isoStr).getTime();
            const s = Math.floor(diff / 1000);
            if (s < 60) return 'just now';
            const m = Math.floor(s / 60);
            if (m < 60) return m + 'm ago';
            const h = Math.floor(m / 60);
            if (h < 24) return h + 'h ago';
            const d = Math.floor(h / 24);
            return d + 'd ago';
        }

        async function loadHistory() {
            try {
                const res = await fetch('/history');
                const data = await res.json();
                historyCount.textContent = data.length;

                clearBtn.style.display = data.length > 0 ? 'inline-block' : 'none';

                if (data.length === 0) {
                    historyList.innerHTML = '<div class="history-empty">No conversions yet</div>';
                    return;
                }

                historyList.innerHTML = '<div class="history-list">' + data.map(item => {
                    const fname = item.input_filename || item.py_filename || '';
                    const type = item.conversion_type === 'html' ? 'HTML' : 'PY';
                    const typeColor = item.conversion_type === 'html' ? '#f472b6' : '#a78bfa';
                    return `
                    <div class="history-item">
                        <div class="history-badge ${item.status}"></div>
                        <div class="history-info">
                            <div class="history-filename"><span style="color:${typeColor};font-size:0.6rem;font-weight:700;margin-right:6px;vertical-align:middle;opacity:0.7;">${type}</span>${esc(fname)}</div>
                            <div class="history-meta">${timeAgo(item.created_at)}${item.pptx_filename ? ' &rarr; ' + esc(item.pptx_filename) : ''}</div>
                            ${item.error ? '<div class="history-error-text" title="' + esc(item.error) + '">' + esc(item.error) + '</div>' : ''}
                        </div>
                        ${item.pptx_filename ? '<span class="history-output">.pptx</span>' : ''}
                    </div>`;
                }).join('') + '</div>';
            } catch (e) {
                // silently fail
            }
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        loadHistory();
    </script>
</body>
</html>
